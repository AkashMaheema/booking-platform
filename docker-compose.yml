
services:
  # ─── PostgreSQL Database ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: booking_platform_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: booking_platform
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d booking_platform']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - booking_network

  # ─── NestJS Application ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: booking_platform_api
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/booking_platform
      # Note: api container connects to postgres service directly via Docker network (port 5432 internally)
      JWT_SECRET: dev-jwt-secret-minimum-32-characters-long
      JWT_EXPIRES_IN: 15m
      REFRESH_SECRET: dev-refresh-secret-minimum-32-characters-long
      REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 100
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - booking_network

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  booking_network:
    driver: bridge
